# Server Infrastructure Hardening Blueprint
# Target Scope: /etc/apache2/apache2.conf Configuration Layer

<IfModule mod_headers.c>
    # Mitigation 1: Block user layout frame presentation overlays (Clickjacking Defense)
    Header set X-Frame-Options "DENY"

    # Mitigation 2: Block browser content stream auto-guessing (MIME-Sniffing Defense)
    Header set X-Content-Type-Options "nosniff"

    # Mitigation 3: Restrict resource acquisition sources specifically to origin roots (XSS Mitigation)
    Header set Content-Security-Policy "default-src 'self';"

    # Mitigation 4: Strict mandatory secure link environment enforcement over runtime ports (HSTS Defense)
    Header set Strict-Transport-Security "max-age=31536000; includeSubDomains"

    # Mitigation 5: Restrict metadata transmission metrics during downstream routing link operations
    Header set Referrer-Policy "strict-origin-when-cross-origin"
</IfModule>
